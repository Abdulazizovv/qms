{% extends "base.html" %}
{% block title %}Navbat ma'lumoti{% endblock %}
{% block extra_css %}
<style>
    .ticket-wrap { max-width: 760px; margin: 0 auto; }
    .ticket-hero { display: flex; align-items: center; justify-content: space-between; gap: 1rem; flex-wrap: wrap; }
    .ticket-num { font-family: var(--mono); font-size: 2.2rem; font-weight: 800; color: var(--accent); letter-spacing: 0.12em; }
    .ticket-panel { margin-top: 1.2rem; }
</style>
{% endblock %}
{% block full_page %}
<main class="main-content">
    <div class="ticket-wrap fade-in">
        <div class="ticket-hero">
            <div>
                <h1>Navbat ma'lumoti</h1>
                <p class="text-muted">Sizning navbatingiz kuzatilmoqda</p>
            </div>
            <div class="ticket-num">#{{ ticket.number }}</div>
        </div>

        <div class="ticket-panel"
             hx-get="{% url status_partial_url ticket.pk %}"
             hx-trigger="load, every 3s"
             hx-swap="innerHTML">
            {% include "client/partials/ticket_status.html" %}
        </div>
    </div>
</main>
{% endblock %}
