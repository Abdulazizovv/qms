{% extends "base.html" %}
{% block title %}Operator Panel{% endblock %}

{% block extra_css %}
<style>
    .op-shell { max-width: 1100px; margin: 0 auto; }
    .op-top { display: flex; justify-content: space-between; gap: 1.25rem; flex-wrap: wrap; }
    .op-sub { color: var(--text-muted); font-size: 0.9rem; margin-top: 0.25rem; }
    .op-grid { display: grid; gap: 1.5rem; grid-template-columns: 1.1fr 1.6fr; margin-top: 1.5rem; }
    .op-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius); padding: 1.5rem; }
    .op-card h3 { font-size: 0.9rem; text-transform: uppercase; letter-spacing: 0.08em; color: var(--text-muted); margin-bottom: 0.75rem; }
    .op-row { display: flex; align-items: center; justify-content: space-between; gap: 1rem; }
    .op-pill { display: inline-flex; align-items: center; gap: 6px; padding: 4px 10px; border-radius: 999px; font-size: 0.75rem; border: 1px solid var(--border); color: var(--text-muted); }
    .op-tick { font-family: var(--mono); font-size: 1.6rem; font-weight: 700; color: var(--accent); letter-spacing: 0.08em; }
    .op-actions { display: flex; gap: 0.5rem; flex-wrap: wrap; margin-top: 0.75rem; }
    .op-list { display: grid; gap: 0.6rem; margin-top: 0.6rem; }
    .op-item { display: flex; align-items: center; justify-content: space-between; padding: 10px 12px; background: var(--bg); border: 1px solid var(--border); border-radius: var(--radius-sm); }
    .btn-ghost { background: var(--bg-hover); border: 1px solid var(--border); color: var(--text); }
    .btn-ghost:hover { border-color: var(--accent); }
    .btn-warning { background: var(--warning); color: #111827; }
    .btn-danger-soft { background: rgba(239,68,68,0.12); color: #fca5a5; border: 1px solid rgba(239,68,68,0.4); }
    .btn-danger-soft:hover { border-color: rgba(239,68,68,0.7); color: #fecaca; }
    .op-muted { color: var(--text-muted); font-size: 0.8rem; }
    .op-divider { border: none; border-top: 1px solid var(--border); margin: 1rem 0; }
    .btn[disabled] { opacity: 0.6; cursor: not-allowed; box-shadow: none; transform: none; }
    @media (max-width: 980px) {
        .op-grid { grid-template-columns: 1fr; }
    }
</style>
{% endblock %}

{% block content %}
<div class="op-shell fade-in"
     hx-get="{% url 'business:operator_panel' %}"
     hx-trigger="load, every 4s"
     hx-target="#op-panel"
     hx-swap="innerHTML">
    <div id="op-panel">
        {% include "operator/partials/panel_content.html" %}
    </div>
</div>
{% endblock %}
