<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Tartibly{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --purple:     #8572E4;
            --purple-d:   #7461D4;
            --purple-s:   rgba(133,114,228,0.10);
            --purple-g:   rgba(133,114,228,0.18);
            --mint:       #98FFD9;
            --mint-d:     #3DD9A4;
            --rose:       #BD5182;
            --bg:         #F8F9FA;
            --bg-card:    #FFFFFF;
            --border:     #E8E6F6;
            --border-d:   #D0CCEE;
            --text:       #0D0B1E;
            --text-dim:   #4A4568;
            --text-muted: #9290B0;
            --success:    #059669;
            --danger:     #DC2626;
            --font:       'Inter', sans-serif;
            --r:          16px;
            --r-sm:       10px;
            --sh:         0 2px 12px rgba(133,114,228,0.09);
            --sh-lg:      0 8px 36px rgba(133,114,228,0.16);
        }
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: var(--font);
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            -webkit-font-smoothing: antialiased;
        }

        /* ── Top nav ── */
        .auth-topnav {
            display: flex; align-items: center; justify-content: space-between;
            padding: 1rem 2rem;
            background: rgba(255,255,255,0.85);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border);
            position: sticky; top: 0; z-index: 100;
        }
        .auth-topnav-brand {
            display: flex; align-items: center; gap: 9px;
            text-decoration: none;
        }
        .auth-topnav-brand-icon {
            width: 34px; height: 34px;
            background: linear-gradient(135deg, var(--purple), var(--rose));
            border-radius: 9px;
            display: flex; align-items: center; justify-content: center;
            font-size: 16px;
        }
        .auth-topnav-brand-name {
            font-size: 1.1rem; font-weight: 800; letter-spacing: -0.03em; color: var(--text);
        }
        .auth-topnav-brand-name span { color: var(--purple); }
        .auth-topnav-back {
            display: flex; align-items: center; gap: 6px;
            color: var(--text-muted); font-size: 0.83rem; font-weight: 600;
            text-decoration: none;
            padding: 7px 14px;
            border: 1.5px solid var(--border);
            border-radius: 50px;
            transition: all 0.18s;
        }
        .auth-topnav-back:hover { border-color: var(--purple); color: var(--purple); background: var(--purple-s); }
        .auth-topnav-back svg { transition: transform 0.18s; }
        .auth-topnav-back:hover svg { transform: translateX(-3px); }

        /* ── Page body ── */
        .auth-page-body {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 1rem 3rem;
        }
        .auth-wrapper {
            width: 100%;
            max-width: 440px;
            animation: fadeUp 0.35s ease;
        }

        /* ── Card ── */
        .auth-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--r);
            padding: 2.25rem;
            box-shadow: var(--sh-lg);
        }
        .auth-card-header {
            text-align: center;
            margin-bottom: 1.75rem;
        }
        .auth-card-header h1 {
            font-size: 1.5rem; font-weight: 800;
            letter-spacing: -0.03em;
            margin-bottom: 5px;
        }
        .auth-card-header p {
            font-size: 0.85rem;
            color: var(--text-muted);
        }

        /* ── Form ── */
        .form-group { margin-bottom: 1.1rem; }
        .form-label {
            display: block;
            font-size: 0.74rem; font-weight: 700;
            color: var(--text-dim);
            margin-bottom: 5px;
            letter-spacing: 0.04em;
            text-transform: uppercase;
        }
        .input-wrap { position: relative; }
        .input-icon {
            position: absolute; left: 12px; top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
            font-size: 15px; pointer-events: none;
            z-index: 1;
        }
        .input-toggle {
            position: absolute; right: 12px; top: 50%;
            transform: translateY(-50%);
            background: none; border: none; cursor: pointer;
            color: var(--text-muted); padding: 4px;
            display: flex; align-items: center;
            transition: color 0.15s;
        }
        .input-toggle:hover { color: var(--purple); }
        .form-control {
            width: 100%;
            padding: 11px 13px 11px 38px;
            background: var(--bg);
            border: 1.5px solid var(--border);
            border-radius: var(--r-sm);
            color: var(--text);
            font-family: var(--font);
            font-size: 0.9rem;
            outline: none;
            transition: border-color 0.18s, box-shadow 0.18s;
            appearance: none;
        }
        .form-control.has-toggle { padding-right: 42px; }
        .form-control.no-icon { padding-left: 13px; }
        .form-control:focus {
            border-color: var(--purple);
            box-shadow: 0 0 0 3px var(--purple-g);
            background: #fff;
        }
        .form-control.is-error { border-color: var(--danger); }
        .form-control::placeholder { color: var(--text-muted); }
        .form-error { color: var(--danger); font-size: 0.75rem; margin-top: 4px; display: block; }

        /* ── Role selector ── */
        .role-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 6px; }
        .role-card { position: relative; }
        .role-card input[type="radio"] { position: absolute; opacity: 0; pointer-events: none; }
        .role-label {
            display: flex; flex-direction: column;
            align-items: center; gap: 7px;
            padding: 14px 10px;
            background: var(--bg);
            border: 1.5px solid var(--border);
            border-radius: var(--r-sm);
            cursor: pointer;
            transition: all 0.18s;
            text-align: center;
        }
        .role-label:hover { border-color: var(--purple); background: var(--purple-s); }
        .role-card input:checked + .role-label {
            border-color: var(--purple);
            background: var(--purple-s);
            box-shadow: 0 0 0 3px var(--purple-g);
        }
        .role-emoji { font-size: 1.4rem; }
        .role-text { font-size: 0.78rem; font-weight: 700; color: var(--text-dim); }
        .role-card input:checked + .role-label .role-text { color: var(--purple); }

        /* ── Button ── */
        .btn {
            display: inline-flex; align-items: center; justify-content: center; gap: 7px;
            width: 100%;
            padding: 13px 20px;
            background: var(--purple);
            color: #fff;
            border: none; border-radius: var(--r-sm);
            font-family: var(--font);
            font-size: 0.95rem; font-weight: 700;
            cursor: pointer;
            transition: all 0.18s;
            box-shadow: 0 4px 18px var(--purple-g);
            letter-spacing: 0.01em;
        }
        .btn:hover { background: var(--purple-d); transform: translateY(-1px); box-shadow: 0 6px 26px rgba(133,114,228,0.35); }
        .btn:active { transform: none; }
        .btn:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }

        /* ── Divider ── */
        .divider {
            display: flex; align-items: center; gap: 12px;
            margin: 1.25rem 0;
            color: var(--text-muted);
            font-size: 0.78rem;
        }
        .divider::before, .divider::after { content: ''; flex: 1; height: 1px; background: var(--border); }

        /* ── Auth link ── */
        .auth-link {
            text-align: center;
            font-size: 0.855rem;
            color: var(--text-muted);
            margin-top: 1.25rem;
        }
        .auth-link a { color: var(--purple); text-decoration: none; font-weight: 700; }
        .auth-link a:hover { text-decoration: underline; }

        /* ── Alerts ── */
        .alert { padding: 10px 14px; border-radius: var(--r-sm); font-size: 0.845rem; margin-bottom: 1rem; }
        .alert-error, .alert-danger { background: rgba(220,38,38,0.08); border: 1px solid rgba(220,38,38,0.25); color: #7f1d1d; }
        .alert-success { background: rgba(5,150,105,0.08); border: 1px solid rgba(5,150,105,0.25); color: #065f46; }
        .alert-info { background: var(--purple-s); border: 1px solid rgba(133,114,228,0.25); color: var(--purple-d); }
        .alert-warning { background: rgba(217,119,6,0.08); border: 1px solid rgba(217,119,6,0.2); color: #78350f; }

        /* ── Footer ── */
        .auth-footer {
            text-align: center;
            padding: 1.5rem;
            font-size: 0.78rem;
            color: var(--text-muted);
            border-top: 1px solid var(--border);
        }

        /* ── Animations ── */
        @keyframes fadeUp { from{opacity:0;transform:translateY(12px)} to{opacity:1;transform:none} }

        /* ── Responsive ── */
        @media (max-width: 480px) {
            .auth-topnav { padding: 0.875rem 1rem; }
            .auth-card { padding: 1.75rem 1.25rem; }
        }
    </style>
    {% block extra_css %}{% endblock %}
</head>
<body>

<!-- Top nav -->
<nav class="auth-topnav">
    <a href="{% url 'client:home' %}" class="auth-topnav-brand">
        <div class="auth-topnav-brand-icon">⚡</div>
        <span class="auth-topnav-brand-name">Tartib<span>li</span></span>
    </a>
    <a href="{% url 'client:home' %}" class="auth-topnav-back">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="15 18 9 12 15 6"/></svg>
        Bosh sahifa
    </a>
</nav>

<!-- Page body -->
<div class="auth-page-body">
    <div class="auth-wrapper">
        <div class="auth-card">
            {% if messages %}
            {% for message in messages %}
            <div class="alert alert-{{ message.tags }}">{{ message }}</div>
            {% endfor %}
            {% endif %}
            {% block content %}{% endblock %}
        </div>
    </div>
</div>

<!-- Footer -->
<footer class="auth-footer">
    © 2025 Tartibly — Aqlli navbat tizimi
</footer>

{% block extra_js %}{% endblock %}
</body>
</html>
